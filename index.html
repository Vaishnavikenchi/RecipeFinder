<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>
    <header>
        <nav>
            
            <div class="logo">
                <h2> 🍳Recipe Finder</h2>
            </div>

            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">Recipes</a>
                <a href="#">Favorites</a>
                <a href="#">About</a>
            </div>

            <div class="theme-btn">
                <button>🌙 Dark Mode</button>
            </div>
        </nav>
    </header>
    <section class="hero">
        <div class="hero-content">

            <h1>Discover Delicious Recipes</h1>
            <p>
                 Search thousands of tasty recipes from around the world.
            Find your next favorite meal in seconds.
            </p>
            <div class="search-box">
                <input type="text" placeholder="Search recipes...">
                <button>Search</button>
            </div>
            <div class="popular-searches">
                <span>Popular:</span>
                <button>Pizza</button>
                <button>Pasta</button>
                 <button>Biryani</button>
                <button>Cake</button>

            </div>
        </div>
    </section>

   <!-- Popular Recipes Section -->

<section class="recipes">

    <h2>Popular Recipes</h2>

    <div class="recipe-container">

        <div class="card">

            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600" alt="Pizza">
            <h3>Veg Pizza</h3>
            <p>⭐ 4.8</p>
            <button>❤️ Favorite</button>

        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600" alt="Burger">

            <h3>Burger</h3>

            <p>⭐ 4.7</p>

            <button>❤️ Favorite</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=600" alt="Pasta">

            <h3>Pasta</h3>

            <p>⭐ 4.9</p>

            <button>❤️ Favorite</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=600" alt="Cake">

            <h3>Chocolate Cake</h3>

            <p>⭐ 4.6</p>

            <button>❤️ Favorite</button>
        </div>

    </div>

</section>
















    
    <script src="js/script.js"></script>
</body>
</html>
